name: Generate Snake

on:
  schedule: # Roda automaticamente a cada 12 horas
    - cron: "0 */12 * * *"
  workflow_dispatch: # Permite rodar manualmente quando quiser

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake SVG/GIF
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.gif?color_snake=#ff0000&color_dots=#000000,#300000,#600000,#900000,#ff0000&gif_duration=30&gif_frames=3
            dist/github-snake-dark.gif?color_snake=#ff0000&color_dots=#000000,#300000,#600000,#900000,#ff0000&gif_duration=30&gif_frames=3

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
